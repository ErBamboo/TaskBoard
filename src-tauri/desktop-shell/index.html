<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Robot Task Board Desktop Shell</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Segoe UI", "Microsoft YaHei UI", sans-serif;
        background: #151a1d;
        color: #f3efe5;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top left, rgba(204, 75, 27, 0.24), transparent 28%),
          radial-gradient(circle at bottom right, rgba(16, 104, 117, 0.2), transparent 30%),
          #151a1d;
      }

      main {
        width: min(720px, calc(100vw - 48px));
        border: 1px solid rgba(243, 239, 229, 0.18);
        border-radius: 24px;
        padding: 32px;
        background: rgba(24, 29, 31, 0.88);
        box-shadow: 10px 10px 0 rgba(0, 0, 0, 0.24);
      }

      h1 {
        margin: 0;
        font-size: 2rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      p {
        margin: 16px 0 0;
        line-height: 1.9;
        color: rgba(243, 239, 229, 0.82);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Robot Task Board</h1>
      <p>Desktop shell initialized. The native window will load the configured remote app URL at runtime.</p>
    </main>
  </body>
 </html>
